name: CI devops 2026
# Déclenchement de l'action sur les pushs et les pull requests vers les branches main et master
on:
  push:
    branches: 
      - main
      - test
  pull_request: # Déclenche le pipeline pour TOUTES les PR

jobs:
  # 1. Job de préparation de l'environnement (checkout + setup Java)
  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

  # 2. Job pour les tests unitaires/build
  test-backend:
    needs: setup-environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Maven Tests
        run: mvn clean verify --file backend/simpleapi/simpleapi/pom.xml

  # 3. Job SonarCloud
  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=laura-dms_simple-api \
            -Dsonar.organization=laura-dms \
            -Dsonar.host.url=https://sonarcloud.io \
            --file backend/simpleapi/simpleapi/pom.xml

  # Job pour construire et pousser les images Docker
  build-and-push-docker-image:
    # CONDITION : Le job ne s'exécute que si on est sur la branche main
    if: github.ref == 'refs/heads/main'
    
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3 # Utilisation de l'action officielle plus sécurisée
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build et Push du BACKEND
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend/simpleapi/simpleapi
          push: true # Toujours true ici car le job entier est filtré par le "if" en haut
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tp-devops-simple-api:latest

      # Build et Push de la DATABASE
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tp-devops-database:latest

      # Build et Push du serveur HTTP
      - name: Build image and push http-server
        uses: docker/build-push-action@v6
        with:
          context: ./http_server
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tp-devops-http-server:latest