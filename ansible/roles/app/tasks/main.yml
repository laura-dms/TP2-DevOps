---
# tasks file for roles/app
- name: Run Backend API
  docker_container:
    name: student-api
    image: lauradmsefrei/tp-devops-simple-api:latest
    networks:
      - name: app-network
    ports:
      - "8080:8080"
    env:
      DATABASE_URL: "database_postgres" # Le nom du conteneur DB sert de host
    restart_policy: always
    # --- AJOUT DU HEALTHCHECK ---
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"] # Check si le port 8080 est ouvert
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s # Laisse 30s à Spring Boot pour booter avant de checker
  # vars:
  #   ansible_python_interpreter: /opt/docker_venv/bin/python