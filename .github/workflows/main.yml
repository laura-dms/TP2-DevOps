name: CI devops 2026
# Déclenchement de l'action sur les pushs et les pull requests vers les branches main et master
on:
  push:
    branches: 
      - main
      - test
      - develop
  pull_request: # Déclenche le pipeline pour TOUTES les PR
  workflow_dispatch: # Permet de déclencher manuellement le workflow depuis l'interface GitHub

jobs:
  # 1. Job pour les tests unitaires/build
  # Lancé sur develop ET main ET test
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Maven Tests
        run: mvn clean verify --file backend/simpleapi/simpleapi/pom.xml

  # 3. Job SonarCloud
  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Indiquer à Git de récupérer tout l'historique (tous les commits, toutes les branches, tous les tags)
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=laura-dms_simple-api \
            -Dsonar.organization=laura-dms \
            -Dsonar.host.url=https://sonarcloud.io \
            --file backend/simpleapi/simpleapi/pom.xml

  # Jobs en // pour construire et pousser les images Docker
  # 3. BUILD DOCKER BACKEND (Attend Sonar pour plus de sécurité)
  build-and-push-backend:
    if: github.ref == 'refs/heads/main'
    needs: sonar-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend/simpleapi/simpleapi
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tp-devops-simple-api:latest

  # 4. BUILD DOCKER DATABASE (En parallèle de tout le reste !)
  build-and-push-database:
    if: github.ref == 'refs/heads/main'
    # PAS DE NEEDS ici, donc démarre dès le push sur main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and push Database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tp-devops-database:latest

  # 5. BUILD DOCKER HTTP SERVER (En parallèle de tout le reste !)
  build-and-push-http-server:
    if: github.ref == 'refs/heads/main'
    # PAS DE NEEDS ici non plus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and push HTTP Server
        uses: docker/build-push-action@v6
        with:
          context: ./http_server
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tp-devops-http-server:latest

  # 6. BUILD DOCKER FRONTEND (En parallèle de tout le reste !)
  build-and-push-frontend:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend # Remplace par le chemin de ton dossier front
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tp-devops-frontend:latest    

  deploy-ansible:
    needs: [build-and-push-backend, build-and-push-database, build-and-push-http-server, build-and-push-frontend] # Attend que tous les builds soient terminés pour plus de sécurité
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # On utilise l'option -t rsa pour être spécifique et on vérifie que la variable existe
          ssh-keyscan -t rsa -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventories/setup.yml ansible/playbook.yml \
          --private-key ~/.ssh/id_rsa \
          -e "ansible_ssh_private_key_file=~/.ssh/id_rsa"

